<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Hub - Healthy System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --dark-blue: #1e3a8a; --primary-blue: #2563eb; --sky-blue: #60a5fa; }
        body { background-color: #f0f9ff; font-family: 'Kanit', sans-serif; min-height: 100vh; }
        .hub-card { 
            background: white; border-radius: 1.5rem; transition: 0.3s; 
            border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-decoration: none; display: block;
        }
        .hub-card:hover { transform: translateY(-10px); box-shadow: 0 10px 25px rgba(37, 99, 235, 0.15); }
    </style>
</head>
<body>
    <nav class="navbar bg-white py-3 shadow-sm mb-5">
        <div class="container d-flex justify-content-between">
            <span class="navbar-brand fw-bold" style="color: var(--dark-blue);"><i class="bi bi-heart-pulse-fill me-2"></i>Healthy System</span>
            <button onclick="logout()" class="btn btn-outline-danger btn-sm rounded-pill">ออกจากระบบ</button>
        </div>
    </nav>

    <div class="container text-center">
        <h2 class="fw-bold mb-4" style="color: var(--dark-blue);">ยินดีต้อนรับคุณ <span id="userDisplay" style="color: var(--primary-blue);">...</span></h2>
        
        <div class="row g-4 justify-content-center">
            <div class="col-md-4">
                <a href="exercise.html" class="hub-card p-5">
                    <i class="bi bi-bicycle display-4 text-primary"></i>
                    <h4 class="mt-3 fw-bold">Exercise</h4>
                    <p class="text-muted small">บันทึกการออกกำลังกาย</p>
                </a>
            </div>
            <div class="col-md-4">
                <a href="energy.html" class="hub-card p-5">
                    <i class="bi bi-fire display-4 text-danger"></i>
                    <h4 class="mt-3 fw-bold">Energy</h4>
                    <p class="text-muted small">บันทึกอาหารและพลังงาน</p>
                </a>
            </div>
            <div class="col-md-4">
                <a href="profile.html" class="hub-card p-5">
                    <i class="bi bi-person-circle display-4 text-info"></i>
                    <h4 class="mt-3 fw-bold">Users</h4>
                    <p class="text-muted small">จัดการข้อมูลส่วนตัว</p>
                </a>
            </div>
        </div>
    </div>

    <script>
        const userData = JSON.parse(localStorage.getItem('currentUser'));
        if (!userData) { window.location.href = "index.html"; }
        else { document.getElementById('userDisplay').innerText = userData.username; }

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
