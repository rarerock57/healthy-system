<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Healthy System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --dark-blue: #1e3a8a;
            --primary-blue: #2563eb;
            --sky-blue: #60a5fa;
            --bg-gradient: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Kanit', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .reg-card {
            background: #ffffff;
            padding: 2rem;
            border-radius: 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--primary-blue);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 5px;
            margin: 20px 0 15px 0;
        }

        .form-control, .form-select {
            padding: 10px 15px;
            border-radius: 10px;
            border: 2px solid #f1f5f9;
            background-color: #f8fafc;
            font-size: 15px;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--sky-blue);
            box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.1);
            background-color: #ffffff;
        }

        .btn-reg {
            background: linear-gradient(to right, var(--primary-blue), var(--sky-blue));
            border: none;
            color: white;
            padding: 14px;
            border-radius: 12px;
            font-weight: 500;
            margin-top: 20px;
            transition: 0.3s;
        }

        .btn-reg:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
            color: white;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
    </style>
</head>
<body>

<div class="reg-card">
    <div class="text-center mb-2">
        <h2 class="fw-bold" style="color: var(--dark-blue);">สร้างบัญชีใหม่</h2>
        <p class="text-muted small">เริ่มต้นดูแลสุขภาพกับ Healthy System</p>
    </div>

    <form id="registerForm" autocomplete="off">
        
        <div class="section-title">🔒 ข้อมูลการเข้าสู่ระบบ</div>
        <div class="input-group mb-3">
            <input type="text" name="username" class="form-control" placeholder="ชื่อผู้ใช้งาน (Username)" required autocomplete="off">
        </div>
        <div class="input-group mb-3">
            <input type="password" name="password" class="form-control" placeholder="รหัสผ่าน (Password)" required autocomplete="new-password">
        </div>
        <div class="input-group mb-3">
            <input type="text" name="name" class="form-control" placeholder="ชื่อ-นามสกุล" required>
        </div>

        <div class="section-title">📊 ข้อมูลร่างกาย</div>
        <div class="grid-2">
            <div class="mb-3">
                <label class="small fw-bold text-muted ms-2">วันเกิด</label>
                <input type="date" name="birthday" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="small fw-bold text-muted ms-2">เพศ</label>
                <select name="gender" class="form-select">
                    <option value="ชาย">ชาย</option>
                    <option value="หญิง">หญิง</option>
                </select>
            </div>
        </div>

        <div class="grid-2">
            <div class="mb-3">
                <label class="small fw-bold text-muted ms-2">น้ำหนัก (กก.)</label>
                <input type="number" step="0.1" name="weight" class="form-control" placeholder="0.0" required>
            </div>
            <div class="mb-3">
                <label class="small fw-bold text-muted ms-2">ส่วนสูง (ซม.)</label>
                <input type="number" step="0.1" name="height" class="form-control" placeholder="0.0" required>
            </div>
        </div>

        <div class="mb-3">
            <label class="small fw-bold text-muted ms-2">ระดับกิจกรรม</label>
            <select name="activity" class="form-select">
                <option value="1.2">ไม่ออกกำลังกายเลย</option>
                <option value="1.375">เล็กน้อย (1-3 วัน/สัปดาห์)</option>
                <option value="1.55">ปานกลาง (3-5 วัน/สัปดาห์)</option>
                <option value="1.725">หนัก (6-7 วัน/สัปดาห์)</option>
            </select>
        </div>

        <button type="submit" id="submitBtn" class="btn btn-reg w-100">
            <span id="btnText">ยืนยันการสมัครสมาชิก</span>
            <span id="btnLoader" class="spinner-border spinner-border-sm d-none"></span>
        </button>

        <div class="text-center mt-3">
            <a href="index.html" class="text-decoration-none small fw-bold" style="color: var(--primary-blue);">กลับไปหน้าเข้าสู่ระบบ</a>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    // 🚩 URL API ชุดรวมล่าสุด (ที่รวมระบบ Dashboard)
    const API_URL = "https://script.google.com/macros/s/AKfycbwilxTT49Z77rXluPvYnKeDY6sdBD25-nu96FE3Xw3D0E6CPTnHPHSAi9B9WHj412gx/exec";

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnLoader = document.getElementById('btnLoader');

        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());
        data.action = "register"; 

        submitBtn.disabled = true;
        btnText.classList.add('d-none');
        btnLoader.classList.remove('d-none');

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify(data)
            });
            const result = await response.json();

            if (result.status === "success") {
                Swal.fire({
                    icon: 'success',
                    title: 'สำเร็จ!',
                    text: 'สมัครสมาชิกเรียบร้อยแล้ว กรุณาเข้าสู่ระบบ',
                    confirmButtonColor: '#2563eb'
                }).then(() => {
                    // 🚩 จุดที่แก้ไข: Redirect ไปที่ index.html
                    window.location.href = "index.html"; 
                });
            } else {
                Swal.fire('ผิดพลาด', result.message, 'error');
            }
        } catch (error) {
            Swal.fire('ผิดพลาด', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error');
        } finally {
            submitBtn.disabled = false;
            btnText.classList.remove('d-none');
            btnLoader.classList.add('d-none');
        }
    });
</script>
</body>
</html>
