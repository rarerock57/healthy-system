<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Healthy System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Kanit', sans-serif;
            margin: 0;
        }
        .login-card {
            background: white;
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        .btn-primary {
            background: #764ba2;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 500;
            transition: 0.3s;
        }
        .btn-primary:hover {
            background: #5a3a7d;
            transform: translateY(-2px);
        }
        .form-control {
            padding: 12px;
            border-radius: 10px;
            border: 2px solid #f0f0f0;
            background-color: #fafafa;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="login-card">
        <div class="text-center mb-4">
            <i class="bi bi-person-bounding-box text-primary" style="font-size: 3rem; color: #764ba2 !important;"></i>
            <h2 class="fw-bold mt-2">Healthy System</h2>
            <p class="text-muted small">เข้าสู่ระบบเพื่อเริ่มดูแลสุขภาพ</p>
        </div>

        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label small fw-bold">ชื่อผู้ใช้งาน (Username)</label>
                <input type="text" id="username" class="form-control" placeholder="กรอกชื่อผู้ใช้งาน" required>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold">รหัสผ่าน (Password)</label>
                <input type="password" id="password" class="form-control" placeholder="กรอกรหัสผ่าน" required>
            </div>
            
            <button type="submit" id="submitBtn" class="btn btn-primary w-100 mb-3">
                <span id="btnText">เข้าสู่ระบบ</span>
                <span id="btnLoader" class="spinner-border spinner-border-sm d-none"></span>
            </button>
        </form>

        <div class="text-center mt-3">
            <p class="small mb-0 text-muted">ยังไม่มีบัญชี? 
                <a href="register/" class="text-decoration-none fw-bold" style="color: #764ba2;">สมัครสมาชิกที่นี่</a>
            </p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    // 🚩 URL ของ Google Apps Script (Web App)
    const API_URL = "https://script.google.com/macros/s/AKfycbzu1ns5zZunQpsQ5ygHWW168n26CXTUI36rU3JD03Br1dpzHFskL_Ry-fb-_R7U8BCP/exec";

    // ตรวจสอบ Session: ถ้าล็อกอินค้างไว้ ให้ไปหน้า Hub ทันที
    if (localStorage.getItem('currentUser')) {
        window.location.href = "hub.html";
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const btnText = document.getElementById('btnText');
        const btnLoader = document.getElementById('btnLoader');
        const submitBtn = document.getElementById('submitBtn');

        // แสดงสถานะโหลด
        submitBtn.disabled = true;
        btnText.classList.add('d-none');
        btnLoader.classList.remove('d-none');

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({
                    action: "login", // ส่ง Action ไปเช็คใน .gs
                    username: username,
                    password: password
                })
            });
            
            const result = await response.json();

            if (result.status === "success") {
                // บันทึก Session ผู้ใช้ลงเครื่อง
                localStorage.setItem('currentUser', JSON.stringify(result.user));
                
                Swal.fire({
                    icon: 'success',
                    title: 'สำเร็จ!',
                    text: 'ยินดีต้อนรับคุณ ' + result.user.username,
                    timer: 1500,
                    showConfirmButton: false
                }).then(() => {
                    window.location.href = "hub.html"; // ไปหน้าชุมทางหลัก
                });
            } else {
                Swal.fire('ผิดพลาด', result.message, 'error');
            }

        } catch (error) {
            Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error');
        } finally {
            submitBtn.disabled = false;
            btnText.classList.remove('d-none');
            btnLoader.classList.add('d-none');
        }
    });
</script>

</body>
</html>
