<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Healthy System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Kanit', sans-serif; margin: 0;
        }
        .login-card {
            background: white; padding: 2.5rem; border-radius: 1.5rem;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 100%; max-width: 400px;
        }
        .btn-primary { background: #764ba2; border: none; padding: 12px; border-radius: 12px; }
        .form-control { padding: 12px; border-radius: 10px; border: 2px solid #f0f0f0; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="text-center mb-4">
        <i class="bi bi-shield-lock-fill text-primary" style="font-size: 3.5rem; color: #764ba2 !important;"></i>
        <h2 class="fw-bold mt-2">Healthy System</h2>
        <p class="text-muted small">เข้าสู่ระบบเพื่อเริ่มต้น</p>
    </div>

    <form id="loginForm">
        <div class="mb-3">
            <label class="form-label small fw-bold">ชื่อผู้ใช้งาน</label>
            <input type="text" id="username" class="form-control" placeholder="Username" required>
        </div>
        <div class="mb-4">
            <label class="form-label small fw-bold">รหัสผ่าน</label>
            <input type="password" id="password" class="form-control" placeholder="Password" required>
        </div>
        <button type="submit" id="submitBtn" class="btn btn-primary w-100">เข้าสู่ระบบ</button>
    </form>

    <div class="text-center mt-3">
        <p class="small mb-0">ยังไม่มีบัญชี? <a href="register.html" class="text-decoration-none fw-bold" style="color: #764ba2;">สมัครสมาชิกที่นี่</a></p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzu1ns5zZunQpsQ5ygHWW168n26CXTUI36rU3JD03Br1dpzHFskL_Ry-fb-_R7U8BCP/exec";

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        Swal.fire({ title: 'กำลังตรวจสอบ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({ action: "login", username: username, password: password })
            });
            const result = await response.json();

            if (result.status === "success") {
                localStorage.setItem('currentUser', JSON.stringify(result.user));
                Swal.fire({ icon: 'success', title: 'สำเร็จ!', text: 'ยินดีต้อนรับ', timer: 1500, showConfirmButton: false })
                .then(() => {
                    // หากยังไม่ได้สร้างไฟล์ hub.html ลิงก์นี้จะยังขึ้น 404 อยู่นะครับ
                    window.location.href = "hub.html"; 
                });
            } else {
                Swal.fire('ผิดพลาด', result.message, 'error');
            }
        } catch (error) {
            Swal.fire('ผิดพลาด', 'เชื่อมต่อเซิร์ฟเวอร์ไม่ได้', 'error');
        }
    });
</script>
</body>
</html>
